version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: recipe_mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-secret}
      MONGO_INITDB_DATABASE: recipe_assistant
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data: